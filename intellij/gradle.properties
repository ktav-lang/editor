# Plugin coordinates — version is the single source of truth.
# The same value lands in plugin.xml via the `pluginConfiguration { version = ... }`
# block in build.gradle.kts; do NOT also hard-code it in plugin.xml.
pluginVersion = 0.3.1

# Gradle settings
org.gradle.jvmargs = -Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.caching = true
org.gradle.parallel = true
org.gradle.configureondemand = true
kotlin.stdlib.default.dependency = false
